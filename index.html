<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Proyectos</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 40px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        .card-content {
            padding: 20px;
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 10px;
        }
        .card-description {
            font-size: 1rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Índice de Mis Proyectos</h1>
    <div class="projects-grid">
        <!-- Proyecto 1: Dashboard -->
        <a href="dashboard/index.html" class="card">
            <div class="card-content">
                <h2 class="card-title">Dashboard</h2>
                <p class="card-description">Un panel de control interactivo para visualización de datos.</p>
            </div>
        </a>

        <!-- Aquí puedes agregar más tarjetas para futuros proyectos -->
        <!--
        <a href="/otro-proyecto" class="card">
            <div class="card-content">
                <h2 class="card-title">Otro Proyecto</h2>
                <p class="card-description">Descripción breve de este otro proyecto.</p>
            </div>
        </a>
        -->
    </div>
</body>
</html>
